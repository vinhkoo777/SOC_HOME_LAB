# ==============================
# SYSTEM LOGS
# ==============================

[monitor:///var/log/syslog]
disabled = 0
sourcetype = syslog

[monitor:///var/log/messages]
disabled = 0
sourcetype = syslog

# ==============================
# AUTHENTICATION 
# ==============================

[monitor:///var/log/auth.log]
disabled = 0
sourcetype = linux_secure

[monitor:///var/log/secure]
disabled = 0
sourcetype = linux_secure

# ==============================
# SSH
# ==============================

[monitor:///var/log/auth.log]
disabled = 0
sourcetype = ssh

# ==============================
# SUDO / PRIV ESC
# ==============================

[monitor:///var/log/sudo.log]
disabled = 0
sourcetype = sudo

# ==============================
# CRON 
# ==============================

[monitor:///var/log/cron]
disabled = 0
sourcetype = cron

# ==============================
# KERNEL / SYSTEM EVENTS
# ==============================

[monitor:///var/log/kern.log]
disabled = 0
sourcetype = kernel

[monitor:///var/log/dmesg]
disabled = 0
sourcetype = kernel

# ==============================
# PACKAGE / INSTALL ACTIVITY
# ==============================

[monitor:///var/log/dpkg.log]
disabled = 0
sourcetype = package

[monitor:///var/log/yum.log]
disabled = 0
sourcetype = package

# ==============================
# DNS 
# ==============================

[monitor:///var/log/syslog]
disabled = 0
sourcetype = dns

# ==============================
# FILE MONITORING 
# ==============================

[monitor:///etc/passwd]
disabled = 0
sourcetype = file_integrity

[monitor:///etc/shadow]
disabled = 0
sourcetype = file_integrity

[monitor:///etc/hosts]
disabled = 0
sourcetype = file_integrity

# ==============================
# SPLUNK INTERNAL LOGS
# ==============================

[monitor://$SPLUNK_HOME/var/log/splunk/splunkd.log]
disabled = 0
index = _internal

[monitor://$SPLUNK_HOME/var/log/splunk/metrics.log]
disabled = 0
index = _internal
