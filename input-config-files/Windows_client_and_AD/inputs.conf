# ==============================
# FILE MONITOR 
# ==============================

[monitor://C:\Windows\System32\drivers\etc\hosts]
disabled = 0
index = file_monitor
sourcetype = WinFile:hosts
followTail = 1

# ==============================
# SPLUNK INTERNAL 
# ==============================

[monitor://$SPLUNK_HOME\var\log\splunk\splunkd.log]
index = _internal

[monitor://$SPLUNK_HOME\var\log\splunk\metrics.log]
index = _internal

# ==============================
# PERFORMANCE METRICS
# ==============================

[perfmon://CPU]
object = Processor
counters = % Processor Time
instances = _Total
interval = 60
index = perfmon

[perfmon://Memory]
object = Memory
counters = Available MBytes
interval = 60
index = perfmon

[perfmon://LogicalDisk]
object = LogicalDisk
counters = % Free Space
instances = *
interval = 60
index = perfmon